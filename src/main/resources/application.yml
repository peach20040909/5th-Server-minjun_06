spring:
  datasource:
    url: jdbc:h2:mem:board
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true   # http://localhost:8080/h2-console 에서 DB 확인
  jpa:
    hibernate:
      ddl-auto: create   # 앱 켤 때마다 테이블 새로 생성 (학습용)
    properties:
      hibernate:
        format_sql: true
    show-sql: true

